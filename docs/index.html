<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tuitionlog</title>
<style>
  body { margin:0; background:#0A1418; color:#f2f2f2; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
         display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .wrap { max-width:560px; padding:48px 24px; text-align:center; }
  h1 { font-size:2.2rem; margin-bottom:0.4em; color:#2C7DA0; }
  p.tag { font-size:1.1rem; color:#c9c9c9; margin-bottom:2em; }
  .feature { background:rgba(255,255,255,0.05); border-radius:14px; padding:16px 20px; margin:12px 0; text-align:left; }
  .feature b { color:#2C7DA0; }
  footer { margin-top:2.5em; font-size:0.85rem; color:#888; }
  a { color:#2C7DA0; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #2C7DA055 0%, #2C7DA000 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Tuitionlog</h1>
  <p class="tag">Track tuition payments, due installments, and remaining balance per term.</p>
  <div class="feature"><b>Free:</b> Installment tracker with balance remaining.</div>
  <div class="feature"><b>Pro:</b> Payment reminder alerts and payoff projection.</div>
  <footer>
    <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
    <p>Contact: <a href="mailto:s0533495227@gmail.com">s0533495227@gmail.com</a></p>
  </footer>
</div>
</body>
</html>
